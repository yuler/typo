# Gemini CLI Policy Configuration
# Defines auto-approval for file edits, specific shell commands, and superpowers extensions

# Auto-accept file edits
[[rule]]
toolName = "write_to_file"
decision = "allow"
priority = 100

[[rule]]
toolName = "replace_file_content"
decision = "allow"
priority = 100

[[rule]]
toolName = "multi_replace_file_content"
decision = "allow"
priority = 100

# Allow specific shell commands via run_command
[[rule]]
toolName = "run_command"
# commandPrefix accepts an array of strings that the command must start with
commandPrefix = [
  "rtk",
  "git",
  "gh",
  "mkdir",
  "cp",
  "pnpm",
  "ls",
  "rm",
  "npx"
]
decision = "allow"
priority = 100

# Allow sending input to commands
[[rule]]
toolName = "send_command_input"
decision = "allow"
priority = 100
