# Gemini CLI policy (typo project template)
#
# IMPORTANT: Workspace policies under <project>/.gemini/policies/ are NOT loaded yet
# (https://github.com/google-gemini/gemini-cli/issues/18186). Copy or sync this file to:
#   ~/.gemini/policies/default.toml
#
# Tool names: https://geminicli.com/docs/reference/tools

# Auto-accept file edits in auto_edit mode
[[rule]]
toolName = [
  "write_file",
  "replace"
]
decision = "allow"
priority = 100
modes = [
  "autoEdit",
  "yolo"
]

# Auto-accept common shell commands (rtk wraps most of these in this repo)
[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "rtk",
  "git",
  "gh",
  "mkdir",
  "cp",
  "pnpm",
  "npm",
  "ls",
  "rm",
  "npx",
  "cargo",
  "bundle",
  "bin/rails",
]
decision = "allow"
priority = 100
allowRedirection = true
modes = [
  "autoEdit",
  "default",
  "yolo"
]

# rtk subcommands and pipes (higher priority than default ask_user rules)
[[rule]]
toolName = "run_shell_command"
commandRegex = "rtk"
decision = "allow"
priority = 200
allowRedirection = true
modes = [
  "autoEdit",
  "default",
  "yolo"
]

[[rule]]
toolName = "send_command_input"
decision = "allow"
priority = 100

[[rule]]
toolName = "activate_skill"
decision = "allow"
priority = 100
