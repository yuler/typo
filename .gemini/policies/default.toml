# Gemini CLI Policy Configuration
# Defines auto-approval for file edits, specific shell commands, and superpowers extensions

# Auto-accept file edits
[[rule]]
toolName = [
  "write_file",
  "replace"
]
decision = "allow"
priority = 100

# Allow specific shell commands via run_shell_command
[[rule]]
toolName = "run_shell_command"
# Allow commands starting with rtk or other common tools
commandPrefix = [
  "rtk",
  "git",
  "gh",
  "mkdir",
  "cp",
  "pnpm",
  "ls",
  "rm",
  "npx"
]
decision = "allow"
priority = 100

# Ensure rtk specifically is allowed with its subcommands and redirection
[[rule]]
toolName = "run_shell_command"
commandRegex = "^rtk.*"
allowRedirection = true
decision = "allow"
priority = 200

# Allow sending input to commands
[[rule]]
toolName = "send_command_input"
decision = "allow"
priority = 100
