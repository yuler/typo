# Gemini CLI Policy Configuration
# Defines auto-approval for file edits, specific shell commands, and superpowers extensions

# Default auto-accept edits
[[rule]]
toolName = ["write_to_file", "replace_file_content", "multi_replace_file_content", "run_command", "send_command_input"]
decision = "allow"
priority = 100

# Allow specific shell commands
[[rule]]
toolName = "run_shell_command"
# commandPrefix accepts an array of strings that the command must start with
commandPrefix = ["rtk", "git", "gh", "mkdir", "cd", "cp", "pnpm"]
decision = "allow"
priority = 100

