name: desktop-ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # PRs: ubuntu only. Pushes to main: full platform matrix (keeps PR feedback fast).
  desktop-matrix-prep:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        env:
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            echo 'matrix={"include":[{"platform":"ubuntu-22.04","args":""}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"platform":"macos-latest","args":"--target aarch64-apple-darwin"},{"platform":"macos-latest","args":"--target x86_64-apple-darwin"},{"platform":"ubuntu-22.04","args":""},{"platform":"windows-latest","args":""}]}' >> "$GITHUB_OUTPUT"
          fi

  desktop-build:
    needs: desktop-matrix-prep
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.desktop-matrix-prep.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev

      - name: install frontend dependencies
        run: pnpm install

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }} --no-bundle
